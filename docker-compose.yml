services:
  argus:
    build: .
    command: ["version"]
    environment:
      LITTLE_HELPER_ENV: development
      LITTLE_HELPER_LLM_PROVIDER: ${LITTLE_HELPER_LLM_PROVIDER:-openai}
      LITTLE_HELPER_LLM_MODEL: ${LITTLE_HELPER_LLM_MODEL:-gpt-5.4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    working_dir: /workspace
    volumes:
      - .:/workspace
